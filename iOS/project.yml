name: LightbulbLedger
options:
  bundleIdPrefix: com.shimondeitel.bulbledger
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  LightbulbLedger:
    type: application
    platform: iOS
    sources:
      - path: LightbulbLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bulbledger
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: LightbulbLedger/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LightbulbLedgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LightbulbLedgerTests
      - path: LightbulbLedger.storekit
    dependencies:
      - target: LightbulbLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bulbledger.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  LightbulbLedgerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LightbulbLedgerUITests
    dependencies:
      - target: LightbulbLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bulbledger.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  LightbulbLedger:
    build:
      targets:
        LightbulbLedger: all
        LightbulbLedgerTests: [test]
        LightbulbLedgerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: LightbulbLedger.storekit
    test:
      config: Debug
      storeKitConfiguration: LightbulbLedger.storekit
      targets:
        - LightbulbLedgerTests
        - LightbulbLedgerUITests
    archive:
      config: Release
